url: https://edgararuiz.github.io/dbplot/

build:
  run_dont_run: true

template:
  bootstrap: 5
  light-switch: true
  bootswatch: yeti

home:
  links:
  - text: Report a bug
    href: https://github.com/edgararuiz/dbplot/issues

navbar:
  structure:
    left:  [intro, reference, news]
    right: [search, github]
  components:
    home:
      icon: fas fa-home fa-lg
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/edgararuiz/dbplot
      aria-label: GitHub

reference:
- title: Plot Functions
  desc: >
    Functions that return ggplot2 objects ready to display or customize.
    All calculations run in the database.
  contents:
  - dbplot_histogram
  - dbplot_bar
  - dbplot_line
  - dbplot_raster
  - dbplot_boxplot

- title: Computation Functions
  desc: >
    Functions that return data frames with aggregated data.
    Use these when you need custom plots or further data processing.
  contents:
  - db_compute_bins
  - db_compute_count
  - db_compute_raster
  - db_compute_raster2
  - db_compute_boxplot

- title: Utility Functions
  desc: >
    Building blocks for creating custom database queries with binning.
  contents:
  - db_bin

- title: Package Documentation
  contents:
  - dbplot-package

authors:
  Edgar Ruiz:
    href: https://github.com/edgararuiz

footer:
  structure:
    left: developed_by
    right: built_with

